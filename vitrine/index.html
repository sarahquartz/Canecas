<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset = "UTF-8">
    <meta name="viewport" content = "width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vitrine</title>
</head>

<body>
    <header class="header">
        <h1>Toma No Caneco</h1>

        <nav class="menu_principal">
            <a href="http://" target="_blank" rel="noopener noreferrer">Inicio</a>
        </nav>

    </header>


    <main>
        
        <section class="container_slider">
            <button id="prev_button"> < </button>

            <div class="container_img">
                <img src="/Img/Amor.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Anime 1.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Anime 2.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Bom dia.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Especial.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Gato Café.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Professor.png" alt="caneca" class="slider_caneca">
                <img src="/Img/Cupcake.png" alt="caneca" class="slider_caneca">
            </div>

            <button id="next_button"> > </button>
        </section>

        <section class="vitrine">

            <div class="card_vitrine">
                <img src="/Img/Vibes.png" alt="caneca">
                <p>Caneca Vibes R$ 50,00</p>
            </div>

            <div class="card_vitrine">
                <img src="/Img/Bom dia 2.png" alt="caneca">
                <p>Caneca Bom dia R$ 45,00</p>
            </div>

        </section>
    </main>
    <script src="script.js"></script>

</html>
